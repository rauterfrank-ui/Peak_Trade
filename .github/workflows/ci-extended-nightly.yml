name: CI Extended Nightly

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: ci-extended-nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extended-nightly-shard:
    name: extended nightly (${{ matrix.python-version }} shard ${{ matrix.shard-id }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']
        shard-id: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify shard partition completeness
        run: python3 scripts/ops/ci_full_suite_shard_v1.py --verify-completeness

      - name: Run extended nightly shard
        run: |
          set -euo pipefail
          mapfile -t SHARD_FILES < <(
            python3 scripts/ops/ci_full_suite_shard_v1.py --emit-shard-files "${{ matrix.shard-id }}"
          )
          echo "[extended-nightly shard=${{ matrix.shard-id }} py=${{ matrix.python-version }}] files=${#SHARD_FILES[@]}"
          pytest "${SHARD_FILES[@]}" -q --tb=short -m "not network and not external_tools"

  extended-nightly-aggregate:
    name: extended nightly aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: extended-nightly-shard
    if: always() && !cancelled()
    steps:
      - name: Require all extended nightly shards passed
        run: |
          [[ "${{ needs.extended-nightly-shard.result }}" == "success" ]] || {
            echo "extended nightly shard matrix failed"
            exit 1
          }
          echo "extended nightly aggregate: all shards passed"

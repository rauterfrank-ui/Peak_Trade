name: Cursor Auto-PR (feat/* -> main)

on:
  push:
    branches:
      - "feat/**"
  workflow_dispatch: {}

# actions: write needed for workflow_dispatch of CI/audit/etc. (otherwise "Resource not accessible by integration")
permissions:
  contents: read
  pull-requests: write
  actions: write

concurrency:
  group: cursor-auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create_pr_if_missing:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const head  = context.ref.replace("refs/heads/", "");
            const base  = "main";

            // Don't PR main to main
            if (head === base) {
              core.info("NOOP: head==base");
              return;
            }

            // Find existing open PR for this branch -> main
            const prs = await github.rest.pulls.list({
              owner, repo,
              state: "open",
              head: `${owner}:${head}`,
              base
            });

            if (prs.data.length > 0) {
              core.info(`EXISTS: PR #${prs.data[0].number} ${prs.data[0].html_url}`);
              // Still dispatch required checks so docs-only PRs get all required contexts
              const workflows = [
                { id: 'ci.yml', inputs: { force_matrix: 'true' } },
                { id: 'lint_gate.yml' },
                { id: 'policy_critic_gate.yml' },
                { id: 'policy_tracked_reports_guard.yml' },
                { id: 'audit.yml' },
                { id: 'ci-workflow-dispatch-guard.yml' },
                { id: 'docs-token-policy-gate.yml' },
                { id: 'docs_reference_targets_gate.yml' },
                { id: 'truth_gates_pr.yml' },
              ];
              for (const w of workflows) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner, repo,
                    workflow_id: w.id,
                    ref: head,
                    inputs: w.inputs || {}
                  });
                  core.info(`dispatched ${w.id} on ${head} (PR exists)`);
                } catch (e) {
                  const detail = e?.response?.data?.message || e?.message || String(e);
                  throw new Error(
                    `createWorkflowDispatch failed: workflow_id=${w.id} ref=${head}: ${detail}`
                  );
                }
              }
              return;
            }

            const title = `auto: ${head} -> ${base}`;
            const body =
              `Auto-created by Cursor workflow.\n\n` +
              `- Branch: \`${head}\`\n` +
              `- Base: \`${base}\`\n` +
              `- Commit: \`${context.sha}\`\n\n` +
              `Labels:\n- cursor-auto\n- automerge\n`;

            let pr;
            try {
              pr = await github.rest.pulls.create({
                owner, repo, head, base, title, body,
                maintainer_can_modify: true
              });
            } catch (e) {
              if (e.message && e.message.includes("already exists")) {
                core.info("PR already exists (race) - treating as success, dispatch will run in next step");
                return;
              }
              throw e;
            }

            // Add labels used by the automerge workflow (retry: GitHub can briefly
            // reject addLabels right after pulls.create — "Could not resolve to a node…")
            const labelsToAdd = ["cursor-auto", "automerge"];
            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.data.number,
                  labels: labelsToAdd,
                });
                core.info(`Labels applied: ${labelsToAdd.join(", ")}`);
                break;
              } catch (e) {
                core.warning(`addLabels attempt ${attempt}/${maxAttempts}: ${e.message}`);
                if (attempt < maxAttempts) {
                  await new Promise((r) => setTimeout(r, 2000 * attempt));
                } else {
                  core.warning(
                    "addLabels failed after retries; PR was created. Add labels manually if needed."
                  );
                }
              }
            }

            core.info(`CREATED: PR #${pr.data.number} ${pr.data.html_url}`);

      - name: Dispatch required checks (workflow_dispatch)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const ref   = context.ref.replace('refs/heads/', '');

            const workflows = [
              { id: 'ci.yml', inputs: { force_matrix: 'true' } },
              { id: 'lint_gate.yml' },
              { id: 'policy_critic_gate.yml' },
              { id: 'policy_tracked_reports_guard.yml' },
              { id: 'audit.yml' },
              { id: 'ci-workflow-dispatch-guard.yml' },
              { id: 'docs-token-policy-gate.yml' },
              { id: 'docs_reference_targets_gate.yml' },
              { id: 'truth_gates_pr.yml' },
            ];

            for (const w of workflows) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: w.id,
                  ref,
                  inputs: w.inputs || {}
                });
                core.info(`dispatched ${w.id} on ${ref}`);
              } catch (e) {
                const detail = e?.response?.data?.message || e?.message || String(e);
                throw new Error(
                  `createWorkflowDispatch failed: workflow_id=${w.id} ref=${ref}: ${detail}`
                );
              }
            }


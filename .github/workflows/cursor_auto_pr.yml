name: Cursor Auto-PR (feat/* -> main)

on:
  push:
    branches:
      - "feat/**"
  workflow_dispatch: {}

# actions: write needed for workflow_dispatch of CI/audit/etc. (otherwise "Resource not accessible by integration")
permissions:
  contents: read
  pull-requests: write
  actions: write

concurrency:
  group: cursor-auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create_pr_if_missing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout for PRE_PR enforcement
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Enforce PRE_PR validation (fail-closed)
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          python3 scripts/ops/verify_pre_pr_validation_result_v0.py \
            --result-file .cursor/PRE_PR_VALIDATION_RESULT.env \
            --base-ref origin/main \
            --check-diff-sha

      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const head  = context.ref.replace("refs/heads/", "");
            const base  = "main";

            // Don't PR main to main
            if (head === base) {
              core.info("NOOP: head==base");
              return;
            }

            // Find existing open PR for this branch -> main
            const prs = await github.rest.pulls.list({
              owner, repo,
              state: "open",
              head: `${owner}:${head}`,
              base
            });

            if (prs.data.length > 0) {
              core.info(`EXISTS: PR #${prs.data[0].number} ${prs.data[0].html_url}`);
              core.info(
                "Required workflows are dispatched once in the next step only (avoids duplicate ci.yml / concurrency cancel)."
              );
              return;
            }

            const title = `auto: ${head} -> ${base}`;
            const body =
              `Auto-created by Cursor workflow.\n\n` +
              `- Branch: \`${head}\`\n` +
              `- Base: \`${base}\`\n` +
              `- Commit: \`${context.sha}\`\n\n` +
              `Labels:\n- cursor-auto\n- automerge\n`;

            let pr;
            try {
              pr = await github.rest.pulls.create({
                owner, repo, head, base, title, body,
                maintainer_can_modify: true
              });
            } catch (e) {
              if (e.message && e.message.includes("already exists")) {
                core.info("PR already exists (race) - treating as success, dispatch will run in next step");
                return;
              }
              throw e;
            }

            // Add labels used by the automerge workflow (retry: GitHub can briefly
            // reject addLabels right after pulls.create — "Could not resolve to a node…")
            const labelsToAdd = ["cursor-auto", "automerge"];
            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.data.number,
                  labels: labelsToAdd,
                });
                core.info(`Labels applied: ${labelsToAdd.join(", ")}`);
                break;
              } catch (e) {
                core.warning(`addLabels attempt ${attempt}/${maxAttempts}: ${e.message}`);
                if (attempt < maxAttempts) {
                  await new Promise((r) => setTimeout(r, 2000 * attempt));
                } else {
                  core.warning(
                    "addLabels failed after retries; PR was created. Add labels manually if needed."
                  );
                }
              }
            }

            core.info(`CREATED: PR #${pr.data.number} ${pr.data.html_url}`);

      - name: Classify contract-only fast-lane candidate
        id: classify
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          CHANGED="$(git diff --name-only origin/main...HEAD 2>/dev/null || true)"
          if [ -z "$CHANGED" ]; then
            echo "contract_only=false"
            echo "contract_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CONTRACT_ONLY=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              src/ops/*_contract_v1.py) ;;
              tests/ops/test_*_contract_v1.py) ;;
              *)
                echo "excluded path: $f"
                CONTRACT_ONLY=false
                break
                ;;
            esac
          done <<< "$CHANGED"
          echo "contract_only=${CONTRACT_ONLY}" >> "$GITHUB_OUTPUT"
          echo "changed_files:"
          echo "$CHANGED"

      - name: Dispatch required checks (workflow_dispatch)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const ref   = context.ref.replace('refs/heads/', '');

            const contractOnly = '${{ steps.classify.outputs.contract_only }}' === 'true';
            const forceMatrix = contractOnly ? 'false' : 'true';
            core.info(
              `contract_only_fast_lane_candidate=${contractOnly} → ci.yml force_matrix=${forceMatrix}`
            );
            core.info("Single workflow_dispatch sequence for required checks (one pass per cursor_auto_pr run).");

            const workflows = [
              { id: 'ci.yml', inputs: { force_matrix: forceMatrix } },
              { id: 'lint_gate.yml' },
              { id: 'policy_critic_gate.yml' },
              { id: 'policy_tracked_reports_guard.yml' },
              { id: 'audit.yml' },
              { id: 'ci-workflow-dispatch-guard.yml' },
              { id: 'docs-token-policy-gate.yml' },
              { id: 'docs_reference_targets_gate.yml' },
              { id: 'truth_gates_pr.yml' },
            ];

            for (const w of workflows) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: w.id,
                  ref,
                  inputs: w.inputs || {}
                });
                core.info(`dispatched ${w.id} on ${ref}`);
              } catch (e) {
                const detail = e?.response?.data?.message || e?.message || String(e);
                throw new Error(
                  `createWorkflowDispatch failed: workflow_id=${w.id} ref=${ref}: ${detail}`
                );
              }
            }

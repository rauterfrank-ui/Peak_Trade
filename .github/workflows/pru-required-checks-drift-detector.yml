name: PR-U / Required Checks Drift Detector
on:
  pull_request:
    paths:
      - "config/ci/required_status_checks.json"
      - ".github/workflows/**"
  schedule:
    - cron: "13 2 * * 1"
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: pru-required-checks-drift-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true
jobs:
  drift-detector:
    name: required-checks-drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Canonical required-checks reconciliation check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/ops/reconcile_required_checks_branch_protection.py \
            --check \
            --required-config config/ci/required_status_checks.json \
            --owner rauterfrank-ui \
            --repo Peak_Trade \
            --branch main

# Diff-aware CI test selection categories (fail-closed). See scripts/ops/ci_test_selection_v1.py
categories:
  docs_only:
    mode: NO_OP
    globs:
      - "docs/**"
      - "out/**"
      - "**/*.md"
    runtime_class: seconds
  workflow_only:
    mode: NO_OP
    globs:
      - ".github/workflows/**"
    runtime_class: seconds
    notes: "tests job NO_OP; Fast-Lane + workflow contract tests cover CI YAML"
  static_contract:
    mode: NO_OP
    globs:
      - "tests/ci/**"
      - "tests/ops/**"
      - "tests/webui/test_*_structure_contract*.py"
      - "src/ops/*_contract_v0.py"
      - "src/ops/*_contract_v1.py"
    runtime_class: seconds
  scripts_focused:
    mode: FOCUSED
    globs:
      - "scripts/**"
    runtime_class: minutes
  tests_focused:
    mode: FOCUSED
    globs:
      - "tests/**"
    runtime_class: minutes
  strategy_regime_owner_focused:
    mode: FOCUSED
    globs:
      - "src/strategies/**"
      - "src/regime/**"
    runtime_class: minutes
    notes: "Single owner prod file + exactly one canonical test owner in diff; blocked for registry/shared paths"
  market_dashboard_focused:
    mode: FOCUSED
    globs:
      - "src/webui/market_*.py"
      - "src/webui/market_*/**"
      - "src/webui/futures_read_only_market_dashboard_*.py"
      - "src/webui/market_futures_ohlcv_*.py"
      - "src/webui/market_ranking_funnel_*.py"
      - "templates/peak_trade_dashboard/market_v0.html"
      - "templates/peak_trade_dashboard/partials/market_*.html"
      - "tests/fixtures/market_*/**"
      - "tests/fixtures/futures_read_only_market_dashboard*/**"
      - "tests/webui/test_market_*.py"
      - "tests/webui/test_futures_read_only_market_dashboard*.py"
      - "tests/test_market_surface_api.py"
      - "scripts/ops/ci_test_selection_v1.py"
      - "config/ci/file_category_mapping.yaml"
      - "tests/ci/test_ci_diff_aware_test_selection_v1.py"
    runtime_class: minutes
    notes: "Bounded canonical /market dashboard diff; central_src FULL preserved for non-dashboard src"
  durable_completion_focused:
    mode: FOCUSED
    globs:
      - "src/ops/bounded_futures_testnet_durable_run_primary_evidence_completion_integration_contract_v0.py"
      - "src/ops/durable_completion_validation/**"
      - "tests/ops/test_durable_completion_validation_graph_v1.py"
      - "tests/ops/test_bounded_futures_testnet_durable_run_primary_evidence_completion_integration_contract_v0.py"
      - "scripts/ops/ci_test_selection_v1.py"
      - "config/ci/file_category_mapping.yaml"
      - "tests/ci/test_ci_diff_aware_test_selection_v1.py"
    runtime_class: minutes
    notes: "Bounded durable completion validation graph refactor; central_src FULL preserved for unrelated src"
  preflight_assembly_focused:
    mode: FOCUSED
    globs:
      - "src/ops/bounded_futures_testnet_preflight_execution_readiness_assembly_lifecycle_integration_contract_v0.py"
      - "tests/ops/test_bounded_futures_testnet_preflight_execution_readiness_assembly_lifecycle_integration_contract_v0.py"
      - "tests/ops/test_bounded_futures_testnet_reconciliation_review_lifecycle_integration_contract_v0.py"
      - "scripts/ops/ci_test_selection_v1.py"
      - "config/ci/file_category_mapping.yaml"
      - "tests/ci/test_ci_diff_aware_test_selection_v1.py"
    runtime_class: minutes
    notes: "Bounded PE-26 preflight assembly + PE-31 reconciliation chain; central_src FULL preserved for unrelated src"
  risk_killswitch_focused:
    mode: FOCUSED
    globs:
      - "src/ops/bounded_futures_testnet_risk_killswitch_lifecycle_integration_contract_v0.py"
      - "tests/ops/test_bounded_futures_testnet_risk_killswitch_lifecycle_integration_contract_v0.py"
      - "tests/ops/test_order_capability_killswitch_abort_binding_contract_v1.py"
      - "scripts/ops/ci_test_selection_v1.py"
      - "config/ci/file_category_mapping.yaml"
      - "tests/ci/test_ci_diff_aware_test_selection_v1.py"
    runtime_class: minutes
    notes: "Bounded PE-22 risk/killswitch + order-capability abort binding chain; central_src FULL preserved for unrelated src"
  tiny_order_focused:
    mode: FOCUSED
    globs:
      - "src/ops/bounded_futures_testnet_tiny_order_lifecycle_integration_contract_v0.py"
      - "tests/ops/test_bounded_futures_testnet_tiny_order_lifecycle_integration_contract_v0.py"
      - "tests/ops/test_order_capability_killswitch_abort_binding_contract_v1.py"
      - "tests/ops/test_order_capability_cancel_cleanup_failclosed_contract_v1.py"
      - "scripts/ops/ci_test_selection_v1.py"
      - "config/ci/file_category_mapping.yaml"
      - "tests/ci/test_ci_diff_aware_test_selection_v1.py"
    runtime_class: minutes
    notes: "Bounded PE-30 tiny-order + order-capability abort/cleanup proof chain; central_src FULL preserved for unrelated src"
  reconciliation_primary_evidence_focused:
    mode: FOCUSED
    globs:
      - "src/ops/bounded_futures_testnet_position_order_reconciliation_primary_evidence_integration_contract_v0.py"
      - "tests/ops/test_bounded_futures_testnet_position_order_reconciliation_primary_evidence_integration_contract_v0.py"
      - "scripts/ops/ci_test_selection_v1.py"
      - "config/ci/file_category_mapping.yaml"
      - "tests/ci/test_ci_diff_aware_test_selection_v1.py"
    runtime_class: minutes
    notes: "Bounded PE-21 position/order/fill reconciliation primary evidence; central_src FULL preserved for unrelated src"
  central_src:
    mode: FULL
    globs:
      - "src/**"
    runtime_class: full_matrix
  global_test_infra:
    mode: FULL
    globs:
      - "pytest.ini"
      - "**/conftest.py"
      - "tests/conftest.py"
    runtime_class: full_matrix
  dependencies:
    mode: FULL
    globs:
      - "requirements.txt"
      - "requirements*.txt"
      - "pyproject.toml"
      - "uv.lock"
    runtime_class: full_matrix
  packaging:
    mode: FULL
    globs:
      - "setup.cfg"
      - "setup.py"
    runtime_class: full_matrix
  coverage_config:
    mode: FULL
    globs:
      - ".coveragerc"
    runtime_class: full_matrix
  config_paths:
    mode: FULL
    globs:
      - "config/**"
      - "schemas/levelup/**"
      - "Makefile"
    runtime_class: full_matrix
  unknown:
    mode: FULL
    globs: []
    runtime_class: full_matrix
